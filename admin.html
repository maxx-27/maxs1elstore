<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Admin - Masuk ke panel admin MaxShop">
    <title>Login Admin - MaxShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">⚡</div>
                <h2>MaxShop Admin</h2>
                <p class="login-sub">Masuk ke panel administrasi</p>
            </div>

            <div class="login-error" id="loginError">
                Username atau password salah!
            </div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 8px;">
                    Masuk ke Dashboard →
                </button>
            </form>

            <div style="text-align:center; margin-top:24px;">
                <a href="index.html" style="color:var(--text-muted); font-size:0.85rem; text-decoration:none;">
                    ← Kembali ke Toko
                </a>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                const errorEl = document.getElementById('loginError');
                errorEl.style.display = 'block';
                errorEl.style.animation = 'fadeIn 0.3s ease';
                setTimeout(() => { errorEl.style.display = 'none'; }, 3000);
            }
            return false;
        }
    </script>
</body>

</html>
